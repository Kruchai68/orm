<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>OMR Mobile Scanner</title>

<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
padding:20px;
background:linear-gradient(120deg,#4facfe,#00f2fe);
color:white;
}

video,canvas{
width:95%;
border:3px solid white;
margin-top:10px;
}

button{
padding:12px;
font-size:18px;
margin:10px;
background:#ff9800;
border:none;
color:white;
border-radius:10px;
}

.result{
background:white;
color:black;
padding:15px;
border-radius:10px;
margin-top:15px;
}

</style>
</head>

<body>

<h2>📷 OMR Mobile Scanner</h2>

<button onclick="startCamera()">เปิดกล้อง</button>
<button onclick="capture()">สแกนกระดาษ</button>

<br>

<video id="video" autoplay></video>
<canvas id="canvas"></canvas>

<div id="result" class="result"></div>

<script>

let video=document.getElementById("video")
let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

function startCamera(){

navigator.mediaDevices.getUserMedia({video:true})
.then(function(stream){
video.srcObject=stream
})

}

function capture(){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

scanOMR()

}

function scanOMR(){

let img=cv.imread(canvas)

let gray=new cv.Mat()
cv.cvtColor(img,gray,cv.COLOR_RGBA2GRAY)

let thresh=new cv.Mat()
cv.threshold(gray,thresh,120,255,cv.THRESH_BINARY_INV)

cv.imshow("canvas",thresh)

readAnswers(thresh)

}

function readAnswers(img){

let answers=[]

let startX=200
let startY=250

let gapX=35
let gapY=30

let choices=["A","B","C","D","E"]

for(let i=0;i<80;i++){

let y=startY+i*gapY

let darkest=999
let ans="-"

for(let j=0;j<5;j++){

let x=startX+j*gapX

let pixel=img.ucharPtr(y,x)[0]

if(pixel>darkest){
darkest=pixel
ans=choices[j]
}

}

answers.push(ans)

}

document.getElementById("result").innerHTML=

"คำตอบนักเรียน<br><br>"+answers.join(" ")

}

</script>

</body>
</html>
